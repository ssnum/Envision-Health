name: Deploy to Cloudflare

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

env:
  NODE_VERSION: '18'

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy Backend to Cloudflare Workers
        run: |
          cd apps/backend
          npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Build Frontend
        run: |
          cd apps/frontend
          npm run build
        env:
          VITE_API_URL: https://envision-health-backend.sahastasai.workers.dev

      - name: Deploy Frontend to Cloudflare Pages
        run: |
          cd apps/frontend
          npx wrangler pages deploy dist --project-name=envision-health-frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Notify Deployment
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "Backend: https://envision-health-backend.sahastasai.workers.dev"
          echo "Frontend: https://envision-health-frontend.pages.dev"

      - name: Notify Failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          exit 1
